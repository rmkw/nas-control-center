<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#071116" />
    <title>Haze Vault</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main id="app">
      <div class="server-pill" id="serverPill">
        <span class="status-dot"></span>
        <span id="serverName">nas.local</span>
      </div>
      <button class="floating-logout hidden" id="floatingLogout" title="Cerrar sesion">
        <svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5" /><path d="M15 12H3" /><path d="M14 4h4a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-4" /></svg>
      </button>

      <section class="login-view" id="loginView">
        <form id="loginForm" class="auth-panel">
          <label>
            Usuario
            <input id="userInput" autocomplete="username" required />
          </label>
          <label>
            Contrasena
            <input id="passInput" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">Entrar</button>
          <div class="form-error" id="loginError"></div>
        </form>
      </section>

      <section class="home-view hidden" id="homeView">
        <section class="storage-grid" id="storageGrid"></section>
      </section>

      <section class="explorer-view hidden" id="explorerView">
        <header class="explorer-header">
          <button class="icon-button" id="homeButton" title="Almacenamientos">
            <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6" /></svg>
          </button>
          <div>
            <nav class="path-crumbs" id="pathCrumbs" aria-label="Ruta actual"></nav>
          </div>
          <div class="header-actions">
            <button class="icon-button" id="selectButton" title="Seleccionar">
              <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></svg>
            </button>
            <button class="icon-button" id="trashViewButton" title="Papelera">
              <svg viewBox="0 0 24 24"><path d="M3 6h18" /><path d="M8 6V4h8v2" /><path d="M6 6l1 15h10l1-15" /></svg>
            </button>
            <button class="icon-button" id="addButton" title="Crear o cargar">
              <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
            </button>
          </div>
        </header>

        <section class="storage-status" id="storageStatus"></section>

        <section class="toolbar" id="fileToolbar">
          <label class="search-box">
            <span>Buscar</span>
            <input id="searchInput" placeholder="Nombre del archivo" />
          </label>
          <label>
            Orden
            <select id="sortSelect">
              <option value="name">Nombre</option>
              <option value="date">Fecha</option>
              <option value="size">Tamaño</option>
              <option value="type">Tipo</option>
            </select>
          </label>
          <div class="filter-tabs" id="filterTabs">
            <button id="viewModeButton" type="button" title="Cambiar vista" aria-label="Cambiar vista">
              <svg viewBox="0 0 24 24"><path d="M4 4h7v7H4z" /><path d="M13 4h7v7h-7z" /><path d="M4 13h7v7H4z" /><path d="M13 13h7v7h-7z" /></svg>
            </button>
            <button class="active" data-filter="all" title="Todos" aria-label="Todos">
              <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 15-6.7L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-15 6.7L3 16" /><path d="M3 21v-5h5" /></svg>
            </button>
            <button data-filter="folder" title="Carpetas" aria-label="Carpetas">
              <svg viewBox="0 0 24 24"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5h4l2 2h7A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5v-9Z" /></svg>
            </button>
            <button data-filter="image" title="Imagenes" aria-label="Imagenes">
              <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z" /><path d="m4 15 4-4 4 4 3-3 5 5" /><path d="M14 9h.01" /></svg>
            </button>
            <button data-filter="video" title="Videos" aria-label="Videos">
              <svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z" /><path d="m10 9 5 3-5 3z" /></svg>
            </button>
            <button data-filter="document" title="Documentos" aria-label="Documentos">
              <svg viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7V3Z" /><path d="M14 3v5h5" /><path d="M9 13h6M9 17h6" /></svg>
            </button>
          </div>
        </section>

        <div class="add-menu hidden" id="addMenu">
          <button data-create="folder">Crear carpeta</button>
          <button data-create="text">Crear archivo TXT</button>
          <button data-create="upload">Cargar desde dispositivo</button>
        </div>

        <input class="hidden-file" id="fileInput" type="file" multiple />
        <section class="selection-bar hidden" id="selectionBar"></section>
        <section class="clipboard-bar hidden" id="clipboardBar"></section>
        <section class="upload-list" id="uploadList"></section>
        <section class="trash-list hidden" id="trashList"></section>
        <section class="file-list" id="fileList"></section>
        <div class="toast hidden" id="toast"></div>
      </section>
    </main>

    <dialog id="textDialog" class="modal">
      <form method="dialog" class="modal-card">
        <h2 id="textDialogTitle">Nuevo</h2>
        <label>
          Nombre
          <input id="nameInput" />
        </label>
        <label id="contentLabel">
          Contenido
          <textarea id="contentInput"></textarea>
        </label>
        <div class="modal-actions">
          <button value="cancel" class="ghost-button">Cancelar</button>
          <button value="ok" class="primary-button">Guardar</button>
        </div>
      </form>
    </dialog>

    <dialog id="previewDialog" class="modal preview-modal">
      <form method="dialog" class="modal-card preview-card">
        <div class="modal-title-row">
          <h2 id="previewTitle">Vista previa</h2>
          <button value="cancel" class="icon-button" title="Cerrar">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <div id="previewBody" class="preview-body"></div>
      </form>
    </dialog>

    <dialog id="detailsDialog" class="modal">
      <form method="dialog" class="modal-card">
        <div class="modal-title-row">
          <h2>Detalles</h2>
          <button value="cancel" class="icon-button" title="Cerrar">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <div id="detailsBody" class="details-body"></div>
        <div class="modal-actions">
          <button id="copyPathButton" value="copy" class="ghost-button">Copiar ruta</button>
          <button id="editTextButton" value="edit" class="ghost-button hidden">Editar texto</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteDialog" class="modal">
      <form method="dialog" class="modal-card danger-card">
        <h2 id="deleteTitle">Enviar a papelera</h2>
        <p id="deleteMessage"></p>
        <div class="modal-actions">
          <button value="cancel" class="ghost-button">Cancelar</button>
          <button value="ok" class="danger-button" id="deleteConfirmButton">Confirmar</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteManyDialog" class="modal">
      <form method="dialog" class="modal-card danger-card">
        <h2 id="deleteManyTitle">Enviar seleccionados a papelera</h2>
        <p id="deleteManyMessage"></p>
        <div class="modal-actions">
          <button value="cancel" class="ghost-button">Cancelar</button>
          <button value="ok" class="danger-button" id="deleteManyConfirmButton">Confirmar</button>
        </div>
      </form>
    </dialog>

    <script src="/assets/app.js"></script>
  </body>
</html>
